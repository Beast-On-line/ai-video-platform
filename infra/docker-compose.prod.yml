services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: videodb
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: videodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: videoredis
    restart: always
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: videominio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: videozookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: videokafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - app-network

  auth-service:
    build: ../services/auth-service
    container_name: auth-service
    restart: always
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/videodb
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  upload-service:
    build: ../services/upload-service
    container_name: upload-service
    restart: always
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/videodb
      KAFKA_BROKER: kafka:9092
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_BUCKET_NAME: ai-video-platform
      S3_ENDPOINT: http://minio:9000
      AWS_REGION: us-east-1
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - postgres
      - kafka
      - minio
    networks:
      - app-network

  video-service:
    build: ../services/video-service
    container_name: video-service
    restart: always
    environment:
      PORT: 3003
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/videodb
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ai-video-platform
      MINIO_SECURE: "false"
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - app-network

  transcription-service:
    build: ../services/transcription-service
    container_name: transcription-service
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/videodb
      KAFKA_BROKER: kafka:9092
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ai-video-platform
      MINIO_SECURE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WHISPER_MODEL: base
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    depends_on:
      - postgres
      - kafka
      - minio
    networks:
      - app-network

  summarization-service:
    build: ../services/summarization-service
    container_name: summarization-service
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/videodb
      KAFKA_BROKER: kafka:9092
      SUMMARIZATION_ENABLED: "true"
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-8b-instant
    depends_on:
      - postgres
      - kafka
    networks:
      - app-network

  search-service:
    build: ../services/search-service
    container_name: search-service
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/videodb
      KAFKA_BROKER: kafka:9092
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    depends_on:
      - postgres
      - kafka
    networks:
      - app-network

  chat-service:
    build: ../services/chat-service
    container_name: chat-service
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/videodb
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-8b-instant
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    depends_on:
      - postgres
    networks:
      - app-network

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_AUTH_SERVICE_URL: ${FRONTEND_URL}
        NEXT_PUBLIC_UPLOAD_SERVICE_URL: ${FRONTEND_URL}
        NEXT_PUBLIC_VIDEO_SERVICE_URL: ${FRONTEND_URL}
        NEXT_PUBLIC_CHAT_SERVICE_URL: ${FRONTEND_URL}
    container_name: frontend
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/etc/letsencrypt
    depends_on:
      - frontend
      - auth-service
      - upload-service
      - video-service
      - chat-service
    networks:
      - app-network

volumes:
  postgres_data:
  minio_data:
  certbot_data:

networks:
  app-network:
    driver: bridge
